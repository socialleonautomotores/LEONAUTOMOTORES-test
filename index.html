<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leon Automotores</title>

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Alibaba+Sans:wght@300;400;500;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
crossorigin="anonymous"
referrerpolicy="no-referrer"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Alibaba Sans',Arial,sans-serif;
color:#1c1c1c;
}

body,html{
height:100%;
scroll-behavior:smooth;
}

.hero{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
height:100vh;
background:linear-gradient(135deg,#1c1c1c,#333333);
color:white;
padding:0 20px;
}

.hero img{
max-width:500px;
width:100%;
margin-bottom:40px;
}

.hero .buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.hero .buttons a{
text-decoration:none;
padding:12px 25px;
border:2px solid #D4AF37;
color:#D4AF37;
font-weight:700;
border-radius:8px;
}

#flota,
.hero .buttons a[href="#flota"]{
display:none!important;
}

section{
padding:80px 20px;
text-align:center;
}

#quienes-somos{
background:#f9f9f9;
}

.quienes-wrapper{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:center;
gap:30px;
}

#quienes-somos .texto{
flex:1 1 400px;
max-width:600px;
text-align:justify;
}

#quienes-somos .foto-gerente{
flex:0 0 70px;
border-radius:50%;
border:3px solid #D4AF37;
}

#novedades{
background:#fff;
}

#opiniones{
background:#f9f9f9;
}

#contactenos{
background:#fff;
min-height:400px;
}

.contact-social{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:40px;
}

.contact-social a{
width:55px;
height:55px;
border:2px solid #D4AF37;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:1.6rem;
text-decoration:none;
color:#D4AF37;
}

.contact-info{
display:flex;
flex-wrap:wrap;
gap:40px;
}

.formulario,
.mapa{
flex:1 1 500px;
}

.mapa iframe{
width:100%;
min-height:450px;
}

input,
select,
textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:12px 25px;
border:2px solid #D4AF37;
background:transparent;
color:#D4AF37;
border-radius:8px;
cursor:pointer;
}

footer{
background:#1c1c1c;
color:white;
padding:20px;
text-align:center;
}

footer a{
color:white;
}

.whatsapp-float,
.backtotop-float{
position:fixed;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-decoration:none;
}

.whatsapp-float{
background:#25d366;
right:20px;
}

.backtotop-float{
background:#333;
right:90px;
}

.reviews-widget{
background:transparent;
padding:0;
}

.section-title{
font-size:2rem;
margin-bottom:25px;
}

.section-inner{
max-width:1200px;
margin:auto;
padding:0 20px;
}

#opiniones .reviews-widget{
padding-bottom:100px;
}

</style>
</head>
